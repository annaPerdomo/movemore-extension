<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="fonts/fonts.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="header-content">
      <div class="brand">
        <svg class="brand-lotus" viewBox="0 0 24 24" fill="none">
          <ellipse cx="12" cy="12" rx="4" ry="10" fill="#C4907A" opacity="0.2" />
          <ellipse cx="12" cy="12" rx="4" ry="10" stroke="#8FA67E" stroke-width="0.8" />
          <ellipse cx="12" cy="12" rx="4" ry="10" stroke="#8FA67E" stroke-width="0.8" transform="rotate(45 12 12)" />
          <ellipse cx="12" cy="12" rx="4" ry="10" fill="#C4907A" opacity="0.15" transform="rotate(45 12 12)" />
          <ellipse cx="12" cy="12" rx="4" ry="10" stroke="#8FA67E" stroke-width="0.8" transform="rotate(-45 12 12)" />
          <ellipse cx="12" cy="12" rx="4" ry="10" fill="#C4907A" opacity="0.15" transform="rotate(-45 12 12)" />
          <ellipse cx="12" cy="12" rx="4" ry="10" stroke="#8FA67E" stroke-width="0.8" transform="rotate(90 12 12)" />
          <ellipse cx="12" cy="12" rx="4" ry="10" fill="#C4907A" opacity="0.15" transform="rotate(90 12 12)" />
          <circle cx="12" cy="12" r="2.5" fill="#8FA67E" opacity="0.25" />
        </svg>
        <h1>MoveMore</h1>
      </div>
      <p class="tagline">Breathe. Stretch. Be kind to your body.</p>
      <div class="stats-row">
        <div class="stat-pill">
          <span class="stat-icon">&#x1F33F;</span>
          <span id="streak">0 stretches</span>
        </div>
        <div class="stat-pill">
          <span class="stat-icon">&#x23F1;</span>
          Next in <span id="nextReminder">--:--</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Lotus divider between header and content -->
  <div class="lotus-divider">
    <div class="divider-line"></div>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
      <ellipse cx="12" cy="12" rx="4" ry="10" fill="#C4907A" opacity="0.2" />
      <ellipse cx="12" cy="12" rx="4" ry="10" stroke="#8FA67E" stroke-width="0.8" />
      <ellipse cx="12" cy="12" rx="4" ry="10" stroke="#8FA67E" stroke-width="0.8" transform="rotate(45 12 12)" />
      <ellipse cx="12" cy="12" rx="4" ry="10" fill="#C4907A" opacity="0.15" transform="rotate(45 12 12)" />
      <ellipse cx="12" cy="12" rx="4" ry="10" stroke="#8FA67E" stroke-width="0.8" transform="rotate(-45 12 12)" />
      <ellipse cx="12" cy="12" rx="4" ry="10" fill="#C4907A" opacity="0.15" transform="rotate(-45 12 12)" />
      <ellipse cx="12" cy="12" rx="4" ry="10" stroke="#8FA67E" stroke-width="0.8" transform="rotate(90 12 12)" />
      <ellipse cx="12" cy="12" rx="4" ry="10" fill="#C4907A" opacity="0.15" transform="rotate(90 12 12)" />
      <circle cx="12" cy="12" r="2.5" fill="#8FA67E" opacity="0.25" />
    </svg>
    <div class="divider-line"></div>
  </div>

  <div class="content">
    <div class="card session-card">
      <span class="session-icon">&#x23F3;</span>
      <div class="session-info">
        <span class="session-time" id="sessionTime">Inactive for 0m</span>
        <span class="session-phrase" id="sessionPhrase"></span>
      </div>
    </div>

    <div class="card toggle-card">
      <div class="toggle-info">
        <span class="card-label">Reminders</span>
        <span class="card-sublabel">Gentle stretch breaks during the day</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="enabledToggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="card">
      <span class="card-label">Remind me every</span>
      <div class="interval-control">
        <div class="interval-track">
          <div class="interval-indicator" id="intervalIndicator"></div>
          <button class="interval-btn" data-minutes="15">15m</button>
          <button class="interval-btn" data-minutes="30">30m<span class="rec-tag">Recommended</span></button>
          <button class="interval-btn" data-minutes="45">45m</button>
          <button class="interval-btn" data-minutes="60">1hr</button>
        </div>
      </div>
    </div>

    <button class="cta-btn" id="stretchNow">
      <span>Stretch Now</span>
    </button>

    <div class="card" id="historySection">
      <span class="card-label">Today's Stretches</span>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>

  <div class="footer">Take care of yourself. You deserve it.</div>
  <script src="popup.js"></script>
</body>
</html>
