<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MoveMore — Stretch Break</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --moss: #8FA67E;
      --moss-light: #A8BC9A;
      --forest: #6B8A5A;
      --forest-dark: #5A7A4A;
      --moss-glow: rgba(107,138,90,0.25);
      --terra: #C4907A;
      --terra-light: #D4A894;
      --olive: #3A4A35;
      --sage: #6B7A62;
      --stone: #D4CBBF;
      --cream: #FFF8F0;
      --shadow: 0 4px 24px rgba(58,74,53,0.08);
      --shadow-hover: 0 6px 32px rgba(58,74,53,0.13);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: var(--olive);
      background: linear-gradient(135deg, #F7F3E8 0%, #E6EDDF 35%, #D0DFC4 65%, #E8D8CB 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Ambient glow blobs — moss & warm stone */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(100px);
      z-index: 0;
    }

    body::before {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(208,223,196,0.45), transparent 70%);
      top: -200px;
      left: -150px;
    }

    body::after {
      width: 550px;
      height: 550px;
      background: radial-gradient(circle, rgba(232,216,203,0.45), transparent 70%);
      bottom: -180px;
      right: -120px;
    }

    /* === LAYOUT === */
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1050px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* === Header === */
    .page-title {
      font-family: 'Cormorant', Georgia, serif;
      font-size: 48px;
      font-weight: 300;
      color: var(--olive);
      line-height: 1.15;
      text-align: center;
      animation: fadeIn 0.6s ease-out both;
    }

    .subtitle {
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      color: var(--sage);
      font-weight: 400;
      letter-spacing: 0.3px;
      margin-top: 8px;
      text-align: center;
      animation: fadeIn 0.6s ease-out 0.08s both;
    }

    .lotus-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 20px auto;
      animation: fadeIn 0.6s ease-out 0.12s both;
    }

    .lotus-divider .divider-line {
      width: 80px;
      height: 1px;
      background: #C4CEBB;
    }

    .progress-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--moss);
      margin-bottom: 24px;
      animation: fadeIn 0.5s ease-out 0.14s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* === Exercise Area === */
    .exercise-area {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      position: relative;
      animation: fadeIn 0.6s ease-out 0.18s both;
    }

    /* Navigation arrows */
    .nav-arrow {
      width: 36px;
      height: 36px;
      min-width: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      border: none;
      color: var(--sage);
      font-size: 18px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: all 0.2s ease;
      flex-shrink: 0;
      line-height: 1;
    }

    .nav-arrow:hover:not(:disabled) {
      background: #fff;
      box-shadow: 0 3px 12px rgba(0,0,0,0.12);
      transform: scale(1.05);
    }

    .nav-arrow:active:not(:disabled) { transform: scale(0.95); }

    .nav-arrow:disabled {
      opacity: 0.35;
      cursor: default;
      pointer-events: none;
    }

    /* === Exercise Panel (frosted glass card) === */
    .exercise-panel {
      flex: 1;
      min-width: 0;
      max-width: 950px;
      min-height: 320px;
      display: grid;
      grid-template-columns: 6fr 4fr;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 4px 24px rgba(58, 74, 53, 0.06);
      overflow: hidden;
      transition: box-shadow 0.3s ease;
    }

    .card-enter {
      animation: cardEnter 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardEnter {
      from { opacity: 0; transform: scale(0.96) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .card-exit {
      animation: cardExit 0.25s ease-in forwards;
    }

    @keyframes cardExit {
      to { opacity: 0; transform: scale(0.96); }
    }

    /* === Left column — media === */
    .card-media {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Watercolor backdrop — moss & terracotta wash (illustrations only) */
    .card-media::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 55% 50%, rgba(143,166,126,0.1) 0%, rgba(196,144,122,0.06) 45%, transparent 75%);
      pointer-events: none;
    }

    .illustration-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
    }

    .illustration-wrap svg {
      width: 100%;
      height: auto;
      max-height: 260px;
    }

    /* Restyle SVG line-art — olive-brown strokes, moss accents */
    .illustration-wrap svg [stroke="white"] { stroke: var(--olive); }
    .illustration-wrap svg [stroke="#ffd700"] { stroke: var(--moss); }
    .illustration-wrap svg [fill="#ffd700"] { fill: var(--moss); }
    .illustration-wrap svg [fill="rgba(255,255,255,0.5)"] { fill: rgba(58,74,53,0.35); }
    .illustration-wrap svg [stroke^="rgba(255,255,255"] { stroke: rgba(58,74,53,0.2); }

    /* Video — fills entire left column */
    .video-container {
      position: absolute;
      inset: 0;
      cursor: pointer;
    }

    .video-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .video-container iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .video-play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.08);
      transition: background 0.25s;
    }

    .video-container:hover .video-play-overlay {
      background: rgba(0,0,0,0.15);
    }

    .video-play-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(255,255,255,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
    }

    .video-container:hover .video-play-btn {
      transform: scale(1.06);
      background: rgba(255,255,255,0.95);
      box-shadow: 0 4px 18px rgba(0,0,0,0.14);
    }

    .video-play-btn svg {
      width: 18px;
      height: 18px;
      margin-left: 2px;
    }

    /* === Right column — text + timer === */
    .card-content {
      padding: 28px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      text-align: left;
    }

    .card-info { min-height: 0; }

    .stretch-name {
      font-family: 'Cormorant', Georgia, serif;
      font-size: 22px;
      font-weight: 300;
      color: var(--olive);
      line-height: 1.2;
      text-align: left;
    }

    .stretch-divider {
      width: 40px;
      height: 2px;
      background: var(--moss);
      border: none;
      margin: 10px 0 14px;
      border-radius: 1px;
    }

    .stretch-description {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.65;
      color: var(--sage);
    }

    /* Timer — bottom right */
    .card-timer {
      margin-top: auto;
      align-self: flex-end;
      display: flex;
      align-items: center;
      gap: 10px;
      padding-top: 14px;
    }

    .phase-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--moss);
      display: none;
    }

    .phase-switch-anim {
      animation: phasePulse 1.5s ease-in-out;
    }

    @keyframes phasePulse {
      0% { opacity: 0; transform: scale(0.8); }
      20% { opacity: 1; transform: scale(1.1); }
      80% { opacity: 1; transform: scale(1.05); }
      100% { opacity: 1; transform: scale(1); }
    }

    .timer-ring-container {
      position: relative;
      width: 72px;
      height: 72px;
      flex-shrink: 0;
    }

    .timer-ring {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .timer-ring-bg {
      fill: none;
      stroke: #e8e4db;
      stroke-width: 3;
    }

    .timer-ring-progress {
      fill: none;
      stroke: var(--moss);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 527.79;
      stroke-dashoffset: 527.79;
      transition: stroke-dashoffset 1s linear;
    }

    .timer-ring-glow {
      fill: none;
      stroke: var(--moss);
      stroke-width: 12;
      stroke-linecap: round;
      stroke-dasharray: 527.79;
      stroke-dashoffset: 527.79;
      filter: blur(8px);
      opacity: 0.18;
      transition: stroke-dashoffset 1s linear;
    }

    .timer-center {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .timer-display {
      font-family: 'DM Sans', sans-serif;
      font-size: 22px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      color: var(--olive);
      line-height: 1;
    }

    /* === Dot indicators === */
    .progress-dots {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
      animation: fadeIn 0.5s ease-out 0.25s both;
    }

    .progress-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--stone);
      transition: all 0.35s ease;
    }

    .progress-dot.active {
      background: var(--forest);
    }

    .progress-dot.done {
      background: var(--terra);
    }

    /* === Buttons === */
    .actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 20px;
      animation: fadeIn 0.5s ease-out 0.3s both;
    }

    .btn {
      padding: 14px 36px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: transform 0.15s ease, box-shadow 0.25s ease, background 0.2s ease;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0) scale(0.97); }

    .btn-skip {
      background: transparent;
      border: 1.5px solid var(--terra);
      color: var(--sage);
    }

    .btn-skip:hover {
      background: rgba(196,144,122,0.1);
    }

    .btn-done {
      background: var(--forest);
      border: none;
      color: var(--cream);
      padding: 14px 44px;
    }

    .btn-done:hover {
      background: var(--forest-dark);
    }

    /* === Done Screen === */
    .done-screen {
      display: none;
      text-align: center;
    }

    .done-check {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 2px solid var(--stone);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes scaleIn {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .done-check svg {
      width: 36px;
      height: 36px;
      stroke: var(--forest);
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .done-check-path {
      stroke-dasharray: 50;
      stroke-dashoffset: 50;
      animation: drawCheck 0.5s ease-out 0.3s forwards;
    }

    @keyframes drawCheck { to { stroke-dashoffset: 0; } }

    .done-screen h2 {
      font-family: 'Cormorant', Georgia, serif;
      font-size: 30px;
      font-weight: 300;
      color: var(--olive);
      margin-bottom: 8px;
      animation: fadeIn 0.5s ease-out 0.15s both;
    }

    .done-screen p {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--sage);
      margin-bottom: 26px;
      line-height: 1.5;
      animation: fadeIn 0.5s ease-out 0.25s both;
    }

    .done-screen .btn { animation: fadeIn 0.5s ease-out 0.35s both; }

    .motivational {
      font-family: 'DM Sans', sans-serif;
      font-style: italic;
      color: var(--sage);
      opacity: 0.5;
      margin-top: 18px;
      font-size: 14px;
      animation: fadeIn 0.5s ease-out 0.45s both;
    }

    .fade-out { animation: fadeOut 0.35s ease-out forwards; }
    @keyframes fadeOut { to { opacity: 0; transform: scale(0.97); } }

    /* === Breathing Glow === */
    .breathing-glow {
      position: absolute;
      width: 600px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(143,166,126,0.10) 0%, rgba(143,166,126,0.04) 40%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: breathe 6s ease-in-out infinite;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(1);
    }

    @keyframes breathe {
      0%, 100% { transform: translate(-50%, -50%) scale(0.92); opacity: 0.7; }
      50% { transform: translate(-50%, -50%) scale(1.08); opacity: 1; }
    }

    /* === Responsive === */
    @media (max-width: 760px) {
      body { padding: 24px 20px; }
      .container { width: 100%; }
      .exercise-panel { grid-template-columns: 1fr; min-height: auto; }
      .card-media { min-height: 220px; }
      .card-content { padding: 20px; }
      .card-timer { align-self: stretch; justify-content: flex-end; }
      .nav-arrow { display: none; }
      .progress-label { margin-bottom: 28px; }
    }
  </style>
</head>
<body>

  <!-- ============================================================
       ACTIVE STRETCH SCREEN
       ============================================================ -->
  <div class="container" id="activeScreen">
    <h1 class="page-title">Time to Move</h1>
    <p class="subtitle" id="subtitle"></p>

    <!-- Lotus divider -->
    <div class="lotus-divider">
      <div class="divider-line"></div>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <ellipse cx="12" cy="12" rx="4" ry="10" fill="#C4907A" opacity="0.2" />
        <ellipse cx="12" cy="12" rx="4" ry="10" stroke="#8FA67E" stroke-width="0.8" />
        <ellipse cx="12" cy="12" rx="4" ry="10" stroke="#8FA67E" stroke-width="0.8" transform="rotate(45 12 12)" />
        <ellipse cx="12" cy="12" rx="4" ry="10" fill="#C4907A" opacity="0.15" transform="rotate(45 12 12)" />
        <ellipse cx="12" cy="12" rx="4" ry="10" stroke="#8FA67E" stroke-width="0.8" transform="rotate(-45 12 12)" />
        <ellipse cx="12" cy="12" rx="4" ry="10" fill="#C4907A" opacity="0.15" transform="rotate(-45 12 12)" />
        <ellipse cx="12" cy="12" rx="4" ry="10" stroke="#8FA67E" stroke-width="0.8" transform="rotate(90 12 12)" />
        <ellipse cx="12" cy="12" rx="4" ry="10" fill="#C4907A" opacity="0.15" transform="rotate(90 12 12)" />
        <circle cx="12" cy="12" r="2.5" fill="#8FA67E" opacity="0.25" />
      </svg>
      <div class="divider-line"></div>
    </div>

    <div class="progress-label" id="progressLabel">Exercise 1 of 3</div>

    <div class="exercise-area">
      <div class="breathing-glow"></div>
      <button class="nav-arrow nav-prev" id="prevBtn" aria-label="Previous exercise">&lsaquo;</button>

      <div class="exercise-panel" id="exercisePanel">
        <div class="card-media" id="cardMedia"></div>
        <div class="card-content">
          <div class="card-info" id="stretchInfo"></div>
          <div class="card-timer">
            <div class="phase-label" id="phaseLabel"></div>
            <div class="timer-ring-container">
              <svg class="timer-ring" viewBox="0 0 180 180">
                <circle class="timer-ring-bg" cx="90" cy="90" r="84" />
                <circle class="timer-ring-glow" cx="90" cy="90" r="84" id="timerGlow" />
                <circle class="timer-ring-progress" cx="90" cy="90" r="84" id="timerRing" />
              </svg>
              <div class="timer-center">
                <div class="timer-display" id="timer">0:30</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <button class="nav-arrow nav-next" id="nextBtn" aria-label="Next exercise">&rsaquo;</button>
    </div>

    <div class="progress-dots" id="exerciseProgress"></div>

    <!-- Second lotus divider -->
    <div class="lotus-divider">
      <div class="divider-line"></div>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <ellipse cx="12" cy="12" rx="4" ry="10" fill="#C4907A" opacity="0.2" />
        <ellipse cx="12" cy="12" rx="4" ry="10" stroke="#8FA67E" stroke-width="0.8" />
        <ellipse cx="12" cy="12" rx="4" ry="10" stroke="#8FA67E" stroke-width="0.8" transform="rotate(45 12 12)" />
        <ellipse cx="12" cy="12" rx="4" ry="10" fill="#C4907A" opacity="0.15" transform="rotate(45 12 12)" />
        <ellipse cx="12" cy="12" rx="4" ry="10" stroke="#8FA67E" stroke-width="0.8" transform="rotate(-45 12 12)" />
        <ellipse cx="12" cy="12" rx="4" ry="10" fill="#C4907A" opacity="0.15" transform="rotate(-45 12 12)" />
        <ellipse cx="12" cy="12" rx="4" ry="10" stroke="#8FA67E" stroke-width="0.8" transform="rotate(90 12 12)" />
        <ellipse cx="12" cy="12" rx="4" ry="10" fill="#C4907A" opacity="0.15" transform="rotate(90 12 12)" />
        <circle cx="12" cy="12" r="2.5" fill="#8FA67E" opacity="0.25" />
      </svg>
      <div class="divider-line"></div>
    </div>

    <div class="actions">
      <button class="btn btn-skip" id="skipBtn">Skip for now</button>
      <button class="btn btn-done" id="startBtn">Begin</button>
    </div>
  </div>

  <!-- ============================================================
       COMPLETED SCREEN
       ============================================================ -->
  <div class="container done-screen" id="doneScreen">
    <div class="done-check">
      <svg viewBox="0 0 40 40">
        <path class="done-check-path" d="M 10 20 L 17 27 L 30 13" />
      </svg>
    </div>
    <h2>Nice work!</h2>
    <p id="doneMessage">Your body thanks you.</p>
    <button class="btn btn-done" id="closeBtn">Back to Work</button>
    <p class="motivational" id="motivational"></p>
  </div>

  <script src="stretch-illustrations.js"></script>
  <script src="stretch-videos.js"></script>
  <script src="reminder.js"></script>
</body>
</html>
